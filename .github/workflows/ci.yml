name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

  # Non-blocking: surfaces lint findings without failing the pipeline. Remove
  # continue-on-error once you've tuned the rules to your taste.
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  # Cross-compile every service for the machines in the fleet and upload the
  # binaries as build artifacts.
  cross-build:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: arm64 # Jetson Nano
          - goos: darwin
            goarch: arm64 # MacBook Air M1
          - goos: linux
            goarch: amd64 # mini PC gateway
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build services
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          for svc in gateway ai-service simulator; do
            out="dist/${svc}-${GOOS}-${GOARCH}"
            echo "building $out"
            go build -trimpath -ldflags="-s -w" -o "$out" "./cmd/${svc}"
          done
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  # Verify each service's container image still builds. No push.
  docker:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        service: [gateway, ai-service, simulator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          build-args: |
            SERVICE=${{ matrix.service }}
          push: false
          tags: iot_ai/${{ matrix.service }}:ci
