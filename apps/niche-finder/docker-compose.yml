# Run the niche-finder anywhere on the LAN — it just needs to reach the
# cluster's HAProxy endpoint for the LLM. Per-machine config lives in .env
# (auto-read by compose).
#
#   docker compose up --build      # build + run (auto-restarts on boot)
#   docker compose logs -f         # watch it
#   docker compose down            # stop
#
# Then open http://<host>:8820
services:
  niche-finder:
    build:
      context: .
    image: iot_ai-niche-finder
    ports:
      - "${NICHE_PORT:-8820}:8820"
    extra_hosts:
      # Lets LLM_BASE_URL = http://host.docker.internal:11434 reach Ollama/HAProxy
      # running on this same host.
      - "host.docker.internal:host-gateway"
    environment:
      # The cluster's single endpoint (HAProxy, Ollama native API) — all text
      # generation flows through here. `edge up` injects the real master from
      # fleet.json; this default is just a fallback.
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      # Mining sources: "name:arg,arg;name:..." (Etsy is auto-enabled when keyed).
      NICHE_SOURCES: ${NICHE_SOURCES:-reddit:somethingimade,Etsy,crafts;gtrends:}
      MINE_LIMIT: ${MINE_LIMIT:-25}
      # Set to enable Etsy mining + Etsy's official-API competition count.
      ETSY_API_KEY: ${ETSY_API_KEY:-}
      # Measured-saturation try order; falls back to an LLM estimate.
      SATURATION_MARKETS: ${SATURATION_MARKETS:-etsy,ebay}
    volumes:
      # Persist the niche DB across restarts/rebuilds.
      - niche-data:/data
    restart: unless-stopped

volumes:
  niche-data:
