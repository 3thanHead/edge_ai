{{define "styles"}}
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
         background: #0f1115; color: #e6e8ee; line-height: 1.5; }
  a { color: #7aa2f7; text-decoration: none; }
  a:hover { text-decoration: underline; }
  header { padding: 18px 24px; border-bottom: 1px solid #232734; display: flex;
           align-items: baseline; gap: 12px; flex-wrap: wrap; }
  header h1 { font-size: 18px; margin: 0; }
  header .sub { color: #8b90a0; font-size: 13px; }
  main { padding: 24px; max-width: 1100px; margin: 0 auto; }
  h2 { font-size: 15px; text-transform: uppercase; letter-spacing: .05em; color: #8b90a0;
       margin: 28px 0 12px; }
  .runbar { display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
            background: #161922; border: 1px solid #232734; border-radius: 10px; padding: 14px 16px; }
  .runbar .status { color: #8b90a0; font-size: 13px; }
  .runbar .status.live { color: #82dab0; }
  .runbar .err { color: #f08a8a; font-size: 12px; }
  button { font: inherit; border: 0; border-radius: 8px; padding: 9px 16px; cursor: pointer;
           background: #4a7bd8; color: #fff; }
  button:hover { filter: brightness(1.1); }
  button:disabled { background: #2a2f3d; color: #8b90a0; cursor: default; filter: none; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(330px, 1fr)); gap: 16px; }
  .card { background: #161922; border: 1px solid #232734; border-radius: 10px; padding: 16px; }
  .card h3 { margin: 0 0 2px; font-size: 15px; }
  .card .kw { color: #8b90a0; font-size: 12px; margin-bottom: 10px; }
  .card .kw .theme { color: #b9bfce; background: #232734; border-radius: 999px; padding: 1px 7px; }
  .card .line { font-size: 13px; margin: 6px 0; }
  .card .line .lbl { color: #8b90a0; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 999px;
           background: #232734; color: #b9bfce; }
  .badge.measured { background: #1d2c4a; color: #8fb6ff; }
  .badge.estimated { background: #3a2f1a; color: #f5c97b; }
  .meter { margin: 12px 0 4px; }
  .meter .track { height: 10px; border-radius: 999px; background: #0f1115; border: 1px solid #232734;
                  overflow: hidden; }
  .meter .fill { height: 100%; border-radius: 999px; }
  .meter .scale { display: flex; justify-content: space-between; font-size: 11px; color: #8b90a0;
                  margin-top: 4px; }
  .opp { font-weight: 600; }
  .empty { color: #8b90a0; font-style: italic; }

  /* keyword list */
  .kwlist { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .kwrow { background: #11141b; border: 1px solid #1e2230; border-radius: 8px; padding: 8px 10px; }
  .kwhead { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 6px; }
  .kwhead .phrase { flex: 1; }
  .track.sm { height: 7px; }
  .tail { font-size: 10px; padding: 1px 6px; border-radius: 999px; text-transform: uppercase; letter-spacing: .03em; }
  .tail.long-tail { background: #15321f; color: #7fd6a0; }
  .tail.short-tail { background: #3a2418; color: #e0a878; }

  /* seeds */
  .seeds { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
  .seed { display: inline-flex; align-items: center; gap: 4px; background: #161922;
          border: 1px solid #232734; border-radius: 999px; padding: 4px 6px 4px 12px; font-size: 13px; }
  .addrow { display: flex; gap: 8px; margin-bottom: 8px; max-width: 520px; }
  .addrow input, .addkw input { flex: 1; background: #0f1115; color: #e6e8ee; border: 1px solid #2a2f3d;
          border-radius: 8px; padding: 8px 10px; font: inherit; min-width: 0; }
  form.inline { display: inline; margin: 0; }
  .addkw { display: inline-flex; gap: 6px; }

  button.mini { background: #232734; color: #b9bfce; padding: 3px 8px; border-radius: 6px;
                font-size: 13px; line-height: 1; }
  button.mini:hover { filter: brightness(1.2); }
  button.mini.x { color: #f0a0a0; }

  /* card actions + states */
  .card.fav { border-color: #d8a657; }
  .card.arch { opacity: .55; }
  .actions { display: flex; gap: 6px; margin-top: 12px; padding-top: 10px; border-top: 1px solid #1e2230; }
  .star.on { color: #f5c97b; }
  .badge.manual { background: #2d2440; color: #c7b3f0; }
  .filter { font-size: 12px; font-weight: 400; text-transform: none; letter-spacing: 0; margin-left: 8px; }
</style>
{{end}}
