# Local simulation of the whole system on one machine.
#
#   docker compose -f deploy/docker-compose.yml up --build              # broker + gateway + ai-service
#   docker compose -f deploy/docker-compose.yml --profile sim up --build # also run the sensor simulator
#
# On a real deployment you'd run the broker + gateway on the mini PC and the
# ai-service on the Jetson/MacBook, pointing each at the broker via MQTT_BROKER_URL.
name: iot_ai

services:
  broker:
    image: eclipse-mosquitto:2
    container_name: iot-broker
    ports:
      - "1883:1883" # MQTT
      - "9001:9001" # MQTT over WebSockets (handy for browser debug tools)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 -i healthcheck || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: ai-service
    container_name: iot-ai-service
    environment:
      MQTT_BROKER_URL: tcp://broker:1883
      AI_MODEL: threshold-v0
      AI_HTTP_ADDR: ":8081"
    ports:
      - "8081:8081"
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: gateway
    container_name: iot-gateway
    environment:
      MQTT_BROKER_URL: tcp://broker:1883
      GATEWAY_HTTP_ADDR: ":8080"
      SITE: default
    ports:
      - "8080:8080"
    depends_on:
      broker:
        condition: service_healthy
    restart: unless-stopped

  # The simulator only runs when you opt in with: --profile sim
  simulator:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        SERVICE: simulator
    container_name: iot-simulator
    environment:
      SIM_TARGET_URL: http://gateway:8080/ingest
      SIM_INTERVAL: 2s
      SIM_NODES: "3"
    depends_on:
      - gateway
    restart: unless-stopped
    profiles: ["sim"]
