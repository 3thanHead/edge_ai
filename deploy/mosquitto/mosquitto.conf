# Mosquitto config for local simulation only.
#
# Anonymous access is enabled for convenience. DO NOT use this as-is on a network
# you don't fully control — add a password file and TLS before exposing the
# broker beyond localhost.

# MQTT over TCP
listener 1883
allow_anonymous true

# MQTT over WebSockets (useful for browser-based MQTT clients while debugging)
listener 9001
protocol websockets

# Keep it stateless for simulation; flip to true (with a data volume) to persist.
persistence false

# Log to stdout so `docker compose logs broker` shows broker activity.
log_dest stdout
