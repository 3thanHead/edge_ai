# HAProxy load balancer for the home LLM cluster.
# Runs on the Mini PC master node (192.168.1.111). Fronts native Ollama on each
# AI machine so the whole house has ONE always-up, load-balanced LLM endpoint:
#
#   http://192.168.1.111:11434   ->  Ollama native API  AND  OpenAI /v1
#   http://192.168.1.111:8404    ->  live backend health / stats dashboard
#
# Edit the `server` lines to add/remove nodes, then `docker compose restart`.

global
    log stdout format raw local0

defaults
    mode http
    log global
    option httplog
    # Generous timeouts: LLM generations stream for a long time.
    timeout connect 5s
    timeout client 300s
    timeout server 300s

frontend llm
    bind *:11434
    default_backend ollama_nodes

backend ollama_nodes
    # Least-connections: send each request to the node with the fewest in-flight
    # generations. All nodes run the same model, so any node can serve any request.
    balance leastconn
    # Active health check: poll Ollama's /api/tags every 3s. A node must fail 3
    # checks to be pulled (fall 3) and pass 2 to return (rise 2) -> automatic
    # failover with no client impact.
    option httpchk GET /api/tags
    http-check expect status 200
    default-server check inter 3s fall 3 rise 2 maxconn 64
    server jetson  192.168.1.188:11434
    server macbook 192.168.1.99:11434
    server windows 192.168.1.222:11434

frontend stats
    bind *:8404
    stats enable
    stats uri /
    stats refresh 5s
    stats show-node
